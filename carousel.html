<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Carousel Section</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* ─── CSS Custom Properties ─────────────────────────────────────── */
    :root {
      --hero-text-primary: #ffffff;
      --hero-text-secondary: rgba(255,255,255,0.65);
      --hero-accent-cyan: #6ec0fb;
      --hero-accent-purple: #a78bfa;
      --hero-primary-black: #0a0a0f;
      --bg-card: #13131a;
      --bg-secondary: #1a1a26;
      --border: rgba(110,192,251,0.15);
      --text-muted: rgba(255,255,255,0.3);

      /* ── Card dimensions ─────────────────────────────────────────────
         These two variables drive EVERYTHING:
           • .hero-carousel-item  width / height
           • .hero-carousel-container  height  (via calc)
           • JS spacing multipliers (read via getComputedStyle)
         Change only these per breakpoint — nothing else needs touching.
      ─────────────────────────────────────────────────────────────── */
      --card-w: 360px;
      --card-h: 420px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    /* ─── Section ───────────────────────────────────────────────────── */
    .hero-carousel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: clamp(40px, 6vh, 80px) 20px clamp(60px, 8vh, 120px);
      background: radial-gradient(ellipse at center,
          rgba(110,192,251,0.08) 0%, transparent 70%);
      overflow-x: hidden;
    }

    /* ─── Section Heading ───────────────────────────────────────────── */
    .hero-section-heading {
      text-align: center;
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto clamp(12px, 2vh, 24px);
      padding: 0 15px;
    }

    .hero-section-heading h2 {
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(135deg,
        var(--hero-text-primary), var(--hero-accent-purple), var(--hero-accent-cyan));
      -webkit-background-clip: text;
      background-clip: text;
      color: #fff;
      position: relative;
      display: inline-block;
    }

    .hero-section-heading h2::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--hero-accent-purple), var(--hero-accent-cyan));
      border-radius: 2px;
    }

    .hero-section-heading p {
      color: var(--hero-text-secondary);
      font-size: clamp(14px, 4vw, 18px);
      letter-spacing: 1px;
      margin-top: 20px;
    }

    /* ─── Carousel Container ────────────────────────────────────────── */
    /*
      height = card height + 40px breathing room for the 3-D tilt.
      It never uses vh — it always matches the card, so there's
      no gap between the card bottom and the nav buttons.
    */
    .hero-carousel-container {
      width: 100%;
      max-width: 1400px;
      height: calc(var(--card-h) + 40px);
      perspective: 1000px;
      position: relative;
      margin-top: clamp(60px, 8vw, 120px);
      overflow: visible;
    }

    .hero-carousel {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ─── Carousel Items ────────────────────────────────────────────── */
    .hero-carousel-item {
      position: absolute;
      width: var(--card-w);
      height: var(--card-h);
      left: 50%;
      top: 50%;
      transform-style: preserve-3d;
      transition: all 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
      cursor: pointer;
      transform-origin: center center;
    }

    .hero-carousel-item .hero-card {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .hero-card-link {
      display: block;
      width: 100%;
      height: 100%;
      text-decoration: none;
      color: inherit;
    }

    .hero-carousel-item:hover .hero-card {
      border-color: var(--hero-accent-cyan);
      transform: translateY(-5px);
    }

    .hero-carousel-item .hero-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent, rgba(110,192,251,0.5), transparent);
      animation: hero-scanline 3s linear infinite;
      pointer-events: none;
    }

    @keyframes hero-scanline {
      0%   { transform: translateY(0); }
      100% { transform: translateY(500px); }
    }

    .hero-card-number {
      position: absolute;
      top: 15px; right: 20px;
      font-size: 60px;
      font-weight: 900;
      color: var(--hero-accent-cyan);
      font-family: 'Orbitron', monospace;
      z-index: 1;
      opacity: 0.2;
    }

    .hero-card-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, var(--bg-secondary), var(--hero-primary-black));
      border-radius: 12px;
      margin-bottom: 15px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border);
    }

    .hero-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: all 0.5s ease;
      opacity: 0.9;
    }

    .hero-carousel-item:hover .hero-card-image img {
      transform: scale(1.05);
      opacity: 1;
    }

    .hero-card-title {
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 700;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--hero-text-primary), var(--hero-accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-card-description {
      color: var(--hero-text-secondary);
      line-height: 1.4;
      margin-bottom: 12px;
      font-size: clamp(11px, 3vw, 13px);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hero-card-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 15px;
    }

    .hero-tech-badge {
      padding: 3px 10px;
      background: rgba(110,192,251,0.12);
      border: 1px solid rgba(110,192,251,0.3);
      border-radius: 20px;
      font-size: 9px;
      color: var(--hero-accent-cyan);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .hero-card-cta {
      padding: 8px 20px;
      background: linear-gradient(135deg, var(--hero-accent-cyan), #2b4d8d);
      border: none;
      border-radius: 30px;
      color: var(--hero-text-primary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(110,192,251,0.3);
      font-size: 11px;
      width: 100%;
      text-align: center;
    }

    .hero-card-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(110,192,251,0.5);
    }

    /* ─── Controls — normal flow, OUTSIDE .hero-carousel-container ─── */
    .hero-carousel-controls {
      position: relative;
      margin-top: clamp(20px, 4vh, 48px);
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 100;
    }

    .hero-carousel-btn {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--hero-accent-cyan);
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-carousel-btn:hover {
      border-color: var(--hero-accent-cyan);
      background: linear-gradient(135deg,
        rgba(110,192,251,0.2), rgba(43,77,141,0.2));
      transform: scale(1.1);
      color: var(--hero-text-primary);
    }

    /* ─── Indicators — normal flow, OUTSIDE .hero-carousel-container ── */
    .hero-carousel-indicators {
      position: relative;
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 100;
    }

    .hero-indicator {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .hero-indicator.active {
      background: linear-gradient(135deg, var(--hero-accent-cyan), #2b4d8d);
      box-shadow: 0 0 10px rgba(110,192,251,0.6);
      transform: scale(1.2);
      border-color: transparent;
    }

    /* ═══════════════════════════════════════════════════════════════
       RESPONSIVE BREAKPOINTS
       Rule: only --card-w and --card-h change per breakpoint.
       The container height, item size, and JS spacing all derive
       from those two variables automatically — no vh, no magic
       numbers duplicated in multiple places.
    ═══════════════════════════════════════════════════════════════ */

    @media (min-width: 1920px) {
      :root { --card-w: 460px; --card-h: 520px; }
      .hero-carousel-container { max-width: 1800px; }
      .hero-section-heading    { max-width: 1600px; }
    }

    @media (min-width: 1600px) and (max-width: 1919px) {
      :root { --card-w: 420px; --card-h: 480px; }
      .hero-carousel-container { max-width: 1600px; }
      .hero-section-heading    { max-width: 1500px; }
    }

    @media (min-width: 1400px) and (max-width: 1599px) {
      :root { --card-w: 380px; --card-h: 440px; }
      .hero-section-heading { max-width: 1400px; }
    }

    @media (max-width: 1200px) {
      :root { --card-w: 320px; --card-h: 380px; }
    }

    @media (max-width: 992px) {
      :root { --card-w: 280px; --card-h: 340px; }
      .hero-carousel-container { perspective: 900px; }
      .hero-card-number { font-size: 45px; top: 12px; right: 15px; }
    }

    @media (max-width: 768px) {
      :root { --card-w: 240px; --card-h: 300px; }
      .hero-carousel-container { perspective: 800px; }
      .hero-card-number      { font-size: 35px; top: 10px; right: 12px; }
      .hero-card-image       { margin-bottom: 12px; }
      .hero-card-title       { margin-bottom: 8px; }
      .hero-card-description { margin-bottom: 10px; -webkit-line-clamp: 2; }
      .hero-card-tech        { margin-bottom: 12px; gap: 5px; }
      .hero-tech-badge       { padding: 2px 8px; font-size: 8px; }
      .hero-card-cta         { padding: 7px 16px; font-size: 10px; }
      .hero-carousel-controls { gap: 12px; }
      .hero-carousel-btn     { width: 40px; height: 40px; font-size: 18px; }
      .hero-indicator        { width: 7px; height: 7px; }
    }

    @media (max-width: 576px) {
      :root { --card-w: 220px; --card-h: 280px; }
      .hero-carousel-container { perspective: 600px; }
      .hero-card-number      { font-size: 30px; top: 8px; right: 10px; }
      .hero-card-image       { margin-bottom: 10px; }
      .hero-card-title       { font-size: 16px; margin-bottom: 6px; }
      .hero-card-description { font-size: 10px; margin-bottom: 8px; -webkit-line-clamp: 2; }
      .hero-tech-badge       { padding: 2px 6px; font-size: 7px; }
      .hero-card-cta         { padding: 6px 12px; font-size: 9px; }
      .hero-carousel-controls { gap: 10px; }
      .hero-carousel-btn     { width: 35px; height: 35px; font-size: 16px; }
      .hero-section-heading h2::after { width: 40px; bottom: -8px; }
    }

    @media (max-width: 400px) {
      :root { --card-w: 200px; --card-h: 260px; }
      .hero-card-number { font-size: 25px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════
     HTML
     .hero-carousel-controls and .hero-carousel-indicators are OUTSIDE
     .hero-carousel-container — they sit in normal document flow and
     stack directly below the carousel at every zoom level.
════════════════════════════════════════════════════════════════════ -->
<section class="hero-carousel-section" id="hero-home">

  <div class="hero-section-heading">
    <h2>SERVICES WE PROVIDE</h2>
    <p>Cutting-edge digital solutions powered by next-generation technology — 24/7 resilience, AI-driven defense, and zero-trust readiness.</p>
  </div>

  <!-- Carousel track only — no controls inside -->
  <div class="hero-carousel-container">
    <div class="hero-carousel" id="heroCarousel"></div>
  </div>

  <!-- Nav buttons in normal flow -->
  <div class="hero-carousel-controls">
    <button class="hero-carousel-btn" id="heroPrevBtn">&#8249;</button>
    <button class="hero-carousel-btn" id="heroNextBtn">&#8250;</button>
  </div>

  <!-- Dot indicators in normal flow -->
  <div class="hero-carousel-indicators" id="heroIndicators"></div>

</section>


<script>
  /* ─── Portfolio data ────────────────────────────────────────────── */
  const heroPortfolioData = [
    {
      id: 1,
      title: '24x7 Managed SOC',
      description: 'Round-the-clock threat detection, AI correlation & Tier 1-3 analysis. Continuous monitoring and rapid response.',
      image: '/assets/images/service-1.jpg',
      link: '../Services/24x7-SOC/',
      tech: ['SOC', 'SIEM', 'Threat Detection', 'AI Analysis']
    },
    {
      id: 2,
      title: 'VAPT',
      description: 'Web, mobile, API, network pentesting and social engineering simulations. Real-world attack emulation.',
      image: '/assets/images/service-2.jpg',
      link: '../Services/vapt/',
      tech: ['Pentesting', 'Vulnerability Assessment', 'Security Testing', 'Risk Analysis']
    },
    {
      id: 3,
      title: 'Assessments & Audits',
      description: 'Deep-dive posture evaluation, gap analysis, compliance readiness (ISO, NIST, GDPR).',
      image: '/assets/images/service-3.jpg',
      link: '../Services/assessment/',
      tech: ['Compliance', 'ISO 27001', 'NIST', 'GDPR', 'Gap Analysis']
    },
    {
      id: 4,
      title: 'Managed Security',
      description: 'Firewall, endpoint, and continuous monitoring — fully managed by security experts.',
      image: '/assets/images/service-4.jpg',
      link: '../Services/mss/',
      tech: ['Firewall Management', 'Endpoint Security', '24/7 Monitoring', 'Expert Management']
    },
    {
      id: 5,
      title: 'Threat Intelligence',
      description: 'Dark web monitoring, threat feeds, and contextual analysis for proactive defense.',
      image: '/assets/images/service-5.jpg',
      link: '../Services/threat-intel/',
      tech: ['Threat Feeds', 'Dark Web Monitoring', 'Contextual Analysis', 'Proactive Defense']
    },
    {
      id: 6,
      title: 'Incident Response',
      description: 'Emergency containment, forensics, ransomware recovery — 30-min SLA.',
      image: '/assets/images/service-6.jpg',
      link: '../Services/ir/',
      tech: ['Emergency Response', 'Forensics', 'Ransomware Recovery', '30-min SLA']
    },
    {
      id: 7,
      title: 'Governance, Risk & Compliance',
      description: 'Integrated risk management, policy, and alignment with ISO/NIST.',
      image: '/assets/images/service-7.jpg',
      link: '../Services/grc/',
      tech: ['Risk Management', 'Policy Development', 'ISO/NIST Alignment', 'GRC Framework']
    },
    {
      id: 8,
      title: 'Identity & Access Management',
      description: 'SSO, MFA, PAM, identity governance — secure your digital identities.',
      image: '/assets/images/service-8.jpg',
      link: '../Services/iam/',
      tech: ['SSO', 'MFA', 'PAM', 'Identity Governance', 'Access Control']
    }
  ];

  /* ─── State ─────────────────────────────────────────────────────── */
  let heroCurrentIndex = 0;
  const heroCarousel            = document.getElementById('heroCarousel');
  const heroIndicatorsContainer = document.getElementById('heroIndicators');

  /* ─── Build one card element ────────────────────────────────────── */
  function heroCreateCarouselItem(data, index) {
    const item         = document.createElement('div');
    item.className     = 'hero-carousel-item';
    item.dataset.index = index;

    const techBadges = data.tech
      .map(t => `<span class="hero-tech-badge">${t}</span>`)
      .join('');

    const num = data.id < 10 ? '0' + data.id : String(data.id);

    item.innerHTML = `
      <a href="${data.link}" class="hero-card-link">
        <div class="hero-card">
          <div class="hero-card-number">${num}</div>
          <div class="hero-card-image">
            <img src="${data.image}" alt="${data.title}" loading="lazy">
          </div>
          <h3 class="hero-card-title">${data.title}</h3>
          <p class="hero-card-description">${data.description}</p>
          <div class="hero-card-tech">${techBadges}</div>
          <div class="hero-card-cta">Learn More</div>
        </div>
      </a>`;

    return item;
  }

  /* ─── Build the full carousel ───────────────────────────────────── */
  function heroInitCarousel() {
    heroCarousel.innerHTML            = '';
    heroIndicatorsContainer.innerHTML = '';

    heroPortfolioData.forEach((data, index) => {
      heroCarousel.appendChild(heroCreateCarouselItem(data, index));

      const dot = document.createElement('div');
      dot.className     = 'hero-indicator' + (index === 0 ? ' active' : '');
      dot.dataset.index = index;
      dot.addEventListener('click', () => heroGoToSlide(index));
      heroIndicatorsContainer.appendChild(dot);
    });

    heroUpdateCarousel();
  }

  /* ─── Read card size from CSS variables ─────────────────────────── */
  /*
    JS reads --card-w so spacing multipliers always match whatever
    size the CSS breakpoint has set. No duplicated numbers.
  */
  function getCardWidth() {
    return parseInt(
      getComputedStyle(document.documentElement).getPropertyValue('--card-w')
    ) || 360;
  }

  /* ─── Position all cards ────────────────────────────────────────── */
  function heroUpdateCarousel() {
    const items      = document.querySelectorAll('.hero-carousel-item');
    const indicators = document.querySelectorAll('.hero-indicator');
    const total      = items.length;
    const vw         = window.innerWidth;
    const isMobile   = vw <= 768;

    const cardW = getCardWidth();

    /*
      Spacing derived from card width — no hardcoded pixel values.
      Multipliers chosen so adjacent cards have a small visible gap
      and still feel like a 3-D fan.
    */
    const sp1 = Math.round(cardW * 1.15);
    const sp2 = Math.round(cardW * 1.75);
    const sp3 = Math.round(cardW * 2.15);

    items.forEach((item, index) => {
      let offset = index - heroCurrentIndex;
      if (offset >  total / 2) offset -= total;
      if (offset < -total / 2) offset += total;

      const abs  = Math.abs(offset);
      const sign = offset < 0 ? -1 : 1;

      item.style.transition = 'all 0.8s cubic-bezier(0.4, 0.0, 0.2, 1)';

      if (abs === 0) {
        item.style.transform = 'translate(-50%, -50%) translateZ(0) scale(1)';
        item.style.opacity   = '1';
        item.style.zIndex    = '10';
      } else if (abs === 1) {
        const rot = isMobile ? 20 : 25;
        const sc  = isMobile ? 0.88 : 0.85;
        item.style.transform = `translate(-50%,-50%) translateX(${sign * sp1}px) translateZ(-150px) rotateY(${-sign * rot}deg) scale(${sc})`;
        item.style.opacity   = '0.85';
        item.style.zIndex    = '5';
      } else if (abs === 2) {
        const rot = isMobile ? 30 : 35;
        const sc  = isMobile ? 0.75 : 0.72;
        item.style.transform = `translate(-50%,-50%) translateX(${sign * sp2}px) translateZ(-280px) rotateY(${-sign * rot}deg) scale(${sc})`;
        item.style.opacity   = '0.6';
        item.style.zIndex    = '3';
      } else if (abs === 3) {
        const rot = isMobile ? 38 : 42;
        const sc  = isMobile ? 0.62 : 0.58;
        item.style.transform = `translate(-50%,-50%) translateX(${sign * sp3}px) translateZ(-400px) rotateY(${-sign * rot}deg) scale(${sc})`;
        item.style.opacity   = '0.35';
        item.style.zIndex    = '2';
      } else {
        item.style.transform = 'translate(-50%,-50%) translateZ(-550px) scale(0.45)';
        item.style.opacity   = '0.15';
        item.style.zIndex    = '1';
      }
    });

    indicators.forEach((dot, i) =>
      dot.classList.toggle('active', i === heroCurrentIndex)
    );
  }

  /* ─── Navigation ────────────────────────────────────────────────── */
  function heroNextSlide() {
    heroCurrentIndex = (heroCurrentIndex + 1) % heroPortfolioData.length;
    heroUpdateCarousel();
  }

  function heroPrevSlide() {
    heroCurrentIndex = (heroCurrentIndex - 1 + heroPortfolioData.length) % heroPortfolioData.length;
    heroUpdateCarousel();
  }

  function heroGoToSlide(index) {
    heroCurrentIndex = index;
    heroUpdateCarousel();
  }

  /* ─── Controls ──────────────────────────────────────────────────── */
  document.getElementById('heroNextBtn').addEventListener('click', heroNextSlide);
  document.getElementById('heroPrevBtn').addEventListener('click', heroPrevSlide);

  /* Auto-rotate */
  let heroAutoRotate = setInterval(heroNextSlide, 5000);
  const heroSection  = document.querySelector('.hero-carousel-section');
  heroSection.addEventListener('mouseenter', () => clearInterval(heroAutoRotate));
  heroSection.addEventListener('mouseleave', () => {
    heroAutoRotate = setInterval(heroNextSlide, 5000);
  });

  /* Keyboard */
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  heroPrevSlide();
    if (e.key === 'ArrowRight') heroNextSlide();
  });

  /* Swipe */
  let touchStartX = 0;
  heroSection.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].clientX;
  }, { passive: true });
  heroSection.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) dx < 0 ? heroNextSlide() : heroPrevSlide();
  }, { passive: true });

  /* Resize */
  let heroResizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(heroResizeTimeout);
    heroResizeTimeout = setTimeout(heroUpdateCarousel, 250);
  });

  /* ─── Init ──────────────────────────────────────────────────────── */
  heroInitCarousel();
</script>

</body>
</html>
